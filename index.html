<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garbage Pickup Request</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="preload" as="image" href="garbageimage.jpg" />
</head>
<body>
    <!--Header-->
    <header class="header">
        <nav class = "nav">
            <a href="index.html"class="nav_logo">Garbpick</a>

            <ul class="nav_items">
                </li><a href="index.html" class="nav_link">Home</a></li>
                </li><a href="about.html"class="nav_link">About us</a></li>
                </li><a href="service.html"class="nav_link">Service</a></li>
                </li><a href="location.html"class="nav_link">Location</a></li>
            </ul>
              
            <button class = "button" id="form-open">Login</button>
        </nav>
    </header>

    <!--Home-->
    <section class="home">
        <div class="form_container">
            <i class="uil uil-times form_close"></i>

            <!--Login Form-->
            <div class="form login_form">
                <form action = "#">
                    <h2>Login</h2>

                    <div class="input_box">
                        <input type="email" placeholder="Enter your email" required/>
                        <i class="uil uil-envelope-alt email"></i>
                    </div>
                    <div class="input_box">
                        <input type="password" placeholder="Enter your password" required/>
                        <i class="uil uil-lock password"></i>
                        <i class="uil uil-eye-slash pw_hide"></i>
                    </div>

                    <div class="option_field">
                        <span class="checkbox">
                            <input type="checkbox" id="check">
                            <label for="check">Remember me</label>
                        </span>
                        <a href="#" class="forgot_pw">Forgot password?</a>
                    </div>

                    <button class="button">Login Now</button>

                    <div class="login_signup">
                    Don't have an account? <a href="#" id="signup">Signup</a>
                    </div>
                </form>
            </div>

            <!--Signup From-->
            <div class="form signup_form">
                <form action = "#">
                    <h2>Signup</h2>

                    <div class="input_box">
                        <input type="email" placeholder="Enter your email" required/>
                        <i class="uil uil-envelope-alt email"></i>
                    </div>
                    <div class="input_box">
                        <input type="password" placeholder="Create password" required/>
                        <i class="uil uil-lock password"></i>
                        <i class="uil uil-eye-slash pw_hide"></i>
                    </div>

                    <div class="input_box">
                        <input type="password" placeholder="Confirm password" required/>
                        <i class="uil uil-lock password"></i>
                        <i class="uil uil-eye-slash pw_hide"></i>
                    </div>

                    <button class="button">Signup Now</button>

                    <div class="login_signup">
                        Already have an account? <a href="#" id="login">Login</a>
                    </div>
                </form>
            </div>

        </div>

        <script src="script.js"></script>
    </section>
</body>
</html>
